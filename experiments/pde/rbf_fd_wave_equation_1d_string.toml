"$schema" = "https://numcollect.musicscience37.com/config_schema/v3/config_schema.json"

[rbf_fd_wave_equation_1d_string]
# Number of nodes in the interior of the domain.
num_interior_nodes = 100
# Order of polynomials used in RBF-FD.
polynomial_order = 4
# Number of neighbors used in RBF-FD.
num_neighbors = 20
# Wave speed.
wave_speed = 1.0
# Time step size.
time_step_size = 0.1
# Final time.
final_time = 1.0

[[num_collect.logging.tag_configs]]
tag = ""
sink = "default"
output_log_level = "summary"
output_log_level_in_child_iterations = "info"
