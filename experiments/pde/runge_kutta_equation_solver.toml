"$schema" = "https://numcollect.musicscience37.com/config_schema/v3/config_schema.json"

[runge_kutta_equation_solver]
# Number of nodes in the interior of the domain.
num_interior_nodes = 1000
# Number of nodes on each edge of the boundary.
num_boundary_nodes_per_edge = 30
# Order of polynomials used in RBF-FD.
polynomial_order = 4
# Number of neighbors used in RBF-FD.
num_neighbors = 20
# Diffusion coefficient.
diffusion_coefficient = 0.1
# Time step size.
time_step_size = 0.01
# Type of the equation solver.
# * "inexact_newton"
# * "fixed_point_iteration"
equation_solver_type = "inexact_newton"
# equation_solver_type = "fixed_point_iteration"
# Relaxation coefficient for the fixed-point iteration.
relaxation_coefficient = 1.0

[[num_collect.logging.tag_configs]]
tag = ""
sink = "default"
output_log_level = "iteration"
iteration_output_period = 1
output_log_level_in_child_iterations = "summary"

[[num_collect.logging.tag_configs]]
tag = "num_collect::ode::impl::fixed_point_iteration_solver"
iteration_output_period = 100

[[num_collect.logging.tag_configs]]
tag = "num_collect::ode::runge_kutta::inexact_newton_update_equation_solver"
output_log_level = "trace"

[[num_collect.logging.tag_configs]]
tag = "num_collect::linear::functional_bicgstab"
output_log_level = "trace"

[[num_collect.logging.tag_configs]]
tag = "num_collect::linear::functional_gmres"
output_log_level = "trace"
